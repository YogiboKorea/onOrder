<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogibo 주문 현황판</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2; --danger: #EF4444; --success: #10B981;
            --bg-color: #F8FAFC; --card-bg: #FFFFFF;
            --text-main: #1E293B; --text-muted: #64748B;
            --border: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } body { padding: 1rem; } }
        header { max-width: 1200px; margin: 0 auto 2rem; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 2rem; }
        h2 { border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .stat-box { background: var(--bg-color); padding: 1rem; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-box .label { font-size: 0.9rem; color: var(--text-muted); }
        .stat-box .value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .inv-list { list-style: none; }
        .inv-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        .badge { background: var(--primary); color: white; padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.8rem; }
        .badge.low { background: var(--danger); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 0.75rem; border-bottom: 1px solid var(--border); text-align: left; }
        th { background: var(--bg-color); color: var(--text-muted); }
        .status-sale { color: var(--primary); font-weight: 600; }
        .status-cancel { color: var(--danger); font-weight: 600; text-decoration: line-through; }
        button { background: var(--success); color: white; padding: 0.6rem 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .cancel-btn { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 0.2rem 0.5rem; font-size: 0.75rem; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Yogibo 현황판</h1>
            <a href="/popup.html" style="color:var(--text-muted); text-decoration:none; font-size:0.9rem;">&larr; 결제 페이지로 돌아가기</a>
        </div>
        <button onclick="location.href='/api/popup/excel'">엑셀 데이터 다운로드</button>
    </header>

    <div class="container">
        <div>
            <div class="card">
                <h2>매출 및 데이터</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="label">총 누적 매출</div>
                        <div class="value" id="dashboard-revenue">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="label">오늘 판매수량</div>
                        <div class="value" id="dashboard-today-qty">0</div>
                    </div>
                </div>

                <h2>실시간 재고</h2>
                <ul class="inv-list" id="inventory-list"></ul>
            </div>
        </div>
        
        <div class="card" style="overflow-x: auto;">
            <h2>최근 판매 내역</h2>
            <table>
                <thead>
                    <tr>
                        <th>상태</th>
                        <th>결제일시</th>
                        <th>상세내용</th>
                        <th>총액</th>
                        <th>취소</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const formatMem = num => num.toLocaleString('ko-KR');

        async function fetchDashboard() {
            const res = await fetch('/api/popup/data');
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('dashboard-revenue').innerText = formatMem(data.totalRevenue) + '원';
                const todayKey = new Date().getFullYear() + '-' + String(new Date().getMonth()+1).padStart(2, '0') + '-' + String(new Date().getDate()).padStart(2, '0');
                const tData = data.dailyData[todayKey] || {qty:0};
                document.getElementById('dashboard-today-qty').innerText = formatMem(tData.qty) + '개';

                const list = document.getElementById('inventory-list');
                list.innerHTML = '';
                for (const [key, info] of Object.entries(data.inventory)) {
                    const remain = info.total - info.sold;
                    const bClass = remain <= 5 ? 'badge low' : 'badge';
                    list.innerHTML += `
                        <li class="inv-item">
                            <span>${key.replace('_', ' / ')} (총 ${info.total})</span>
                            <span class="${bClass}">잔여 ${remain}</span>
                        </li>
                    `;
                }

                const tb = document.getElementById('history-body');
                tb.innerHTML = '';
                data.sales.slice(0, 15).forEach(s => {
                    const isC = s.status === 'CANCEL';
                    const time = new Date(s.timestamp).toLocaleTimeString('ko-KR');
                    tb.innerHTML += `
                        <tr>
                            <td class="${isC ? 'status-cancel' : 'status-sale'}">${isC ? '취소됨' : '판매완료'}</td>
                            <td>${time}</td>
                            <td>
                                <b>${s.product}</b> (${s.color}) - ${s.qty}개<br>
                                <span style="font-size:0.8rem; color:#666;">${s.customerName||'이름없음'} / ${s.customerPhone||'연락처없음'}</span>
                            </td>
                            <td>${formatMem(s.totalAmount)}원</td>
                            <td>${!isC ? `<button class="cancel-btn" onclick="cancelOrder('${s._id}')">취소</button>` : ''}</td>
                        </tr>
                    `;
                });
            }
        }

        async function cancelOrder(id) {
            if(!confirm('해당 결제건을 취소 처리할까요? 재고가 원복됩니다.')) return;
            const res = await fetch('/api/popup/cancel', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            });
            const result = await res.json();
            if(result.success) fetchDashboard();
            else alert(result.message);
        }

        fetchDashboard();
        setInterval(fetchDashboard, 30000);
    </script>
</body>
</html>
