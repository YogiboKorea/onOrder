<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>샐리필주문 현황판</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #5A67D8;
            --primary-hover: #434190;
            --bg-color: #F7FAFC;
            --card-bg: #FFFFFF;
            --text-main: #2D3748;
            --text-muted: #718096;
            --danger: #E53E3E;
            --success: #38A169;
            --border: #E2E8F0;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.03);
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }

        body {
            background: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
            color: var(--text-main);
            line-height: 1.6;
            padding: 1.5rem 1rem;
            min-height: 100vh;
        }

        /* ===== LAYOUT ===== */
        header {
            max-width: 1200px;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            padding: 1.25rem 1.75rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.7);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            body { padding: 1rem 0.75rem; }
            header { padding: 1rem; }
        }

        /* ===== HEADER ELEMENTS ===== */
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1A202C;
            margin-bottom: 0.2rem;
            white-space: nowrap;
        }

        .btn-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.35rem 0.75rem;
            border-radius: 99px;
            transition: 0.2s;
            background: #EDF2F7;
            display: inline-block;
            white-space: nowrap;
        }
        .btn-link:hover { background: #E2E8F0; color: #2D3748; }

        button.export-btn {
            background: linear-gradient(135deg, #38A169 0%, #276749 100%);
            color: white;
            border: none;
            padding: 0.7rem 1.25rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(56,161,105,0.25);
            white-space: nowrap;
            font-size: 0.9rem;
        }
        button.export-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(56,161,105,0.3); }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            padding: 1.75rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.7);
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            color: #1A202C;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        h2::before {
            content: "";
            display: block;
            width: 4px;
            height: 16px;
            background: var(--primary);
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* ===== STATS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
        }
        .stat-box {
            background: linear-gradient(145deg, #ffffff, #f8fafc);
            padding: 1.1rem;
            border-radius: 14px;
            border: 1px solid var(--border);
        }
        .stat-box .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 0.35rem;
            word-break: keep-all;
        }
        .stat-box .value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            white-space: nowrap;
        }

        /* ===== INVENTORY LIST ===== */
        .inv-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
        .inv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 1rem;
            background: #F8FAFC;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .badge {
            background: #EBF4FF;
            color: var(--primary);
            padding: 0.25rem 0.7rem;
            border-radius: 99px;
            font-weight: 700;
            font-size: 0.82rem;
            white-space: nowrap;
        }
        .badge.low { background: #FEE2E2; color: var(--danger); }

        /* ===== TABLE ===== */
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 640px; }
        th, td { padding: 0.9rem 1rem; text-align: left; }
        th {
            background: #F8FAFC;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td { border-bottom: 1px solid var(--border); vertical-align: top; padding-top: 1rem; }
        td:nth-child(3) { white-space: normal; min-width: 220px; line-height: 1.5; }
        tr:last-child td { border-bottom: none; }

        /* ===== STATUS BADGES ===== */
        .status-sale {
            color: var(--success); font-weight: 700; background: #D1FAE5;
            padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem;
            display: inline-block; white-space: nowrap;
        }
        .status-cancel {
            color: var(--danger); font-weight: 700; background: #FEE2E2;
            padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem;
            display: inline-block; text-decoration: line-through; white-space: nowrap;
        }

        /* ===== CANCEL BUTTON ===== */
        .cancel-btn {
            background: white; color: var(--danger);
            border: 1px solid #FECACA; padding: 0.4rem 0.8rem;
            font-size: 0.8rem; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            white-space: nowrap;
        }
        .cancel-btn:hover { background: #FEE2E2; border-color: var(--danger); transform: translateY(-1px); }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>샐리필 현황판</h1>
            <a href="/popup.html" class="btn-link">&larr; 결제 페이지로 돌아가기</a>
        </div>
        <div style="display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end;">
            <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                <input type="date" id="start-date"
                    style="padding: 0.65rem 1rem; width: auto; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 10px;">
                <span style="color: var(--text-muted); font-weight: 600;">~</span>
                <input type="date" id="end-date"
                    style="padding: 0.65rem 1rem; width: auto; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 10px;">
                <button class="export-btn"
                    style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%); box-shadow: 0 4px 6px rgba(90, 103, 216, 0.25); padding: 0.65rem 1rem;"
                    onclick="fetchDashboard()">조회</button>
                <button class="export-btn" onclick="downloadExcel()">엑셀 다운로드</button>
            </div>
            <div style="display: flex; gap: 0.3rem;">
                <button class="btn-link" onclick="setDate('2026-04-03')">4/3 (금)</button>
                <button class="btn-link" onclick="setDate('2026-04-04')">4/4 (토)</button>
                <button class="btn-link" onclick="setDate('2026-04-05')">4/5 (일)</button>
                <button class="btn-link" onclick="setDate('', '')">전체 기간</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div>
            <div class="card">
                <h2>매출 및 데이터</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="label">총 누적 매출</div>
                        <div class="value" id="dashboard-revenue">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="label" id="qty-label">기간내 판매수량</div>
                        <div class="value" id="dashboard-qty">0</div>
                    </div>
                </div>

                <h2>실시간 재고</h2>
                <ul class="inv-list" id="inventory-list"></ul>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div class="card">
                <h2>일자별 집계</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>일자</th>
                                <th>판매 수량</th>
                                <th>결제 금액</th>
                                <th>취소 수량</th>
                                <th>취소 금액</th>
                                <th>순매출액</th>
                            </tr>
                        </thead>
                        <tbody id="daily-body">
                            <tr><td colspan="6" style="text-align:center; color:var(--text-muted);">조회된 데이터가 없습니다.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>최근 판매 내역</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>상태</th>
                                <th>결제일시</th>
                                <th>상세내용</th>
                                <th>총액</th>
                                <th>취소</th>
                            </tr>
                        </thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const formatMem = num => num.toLocaleString('ko-KR');

        function setDate(start, end) {
            document.getElementById('start-date').value = start;
            document.getElementById('end-date').value = end !== undefined ? end : start;
            fetchDashboard();
        }

        function downloadExcel() {
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            const query = new URLSearchParams();
            if (start) query.append('start', start);
            if (end) query.append('end', end);
            location.href = '/api/popup/excel?' + query.toString();
        }

        async function fetchDashboard() {
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            const query = new URLSearchParams();
            if (start) query.append('start', start);
            if (end) query.append('end', end);

            const res = await fetch('/api/popup/data?' + query.toString());
            const data = await res.json();

            if (data.success) {
                document.getElementById('dashboard-revenue').innerText = formatMem(data.totalRevenue) + '원';

                let periodQty = 0;
                data.sales.forEach(s => {
                    if (s.status === 'SALE') periodQty += s.qty;
                });
                document.getElementById('dashboard-qty').innerText = formatMem(periodQty) + '개';

                if (start || end) {
                    document.getElementById('qty-label').innerText = '선택 기간 판매수량';
                } else {
                    document.getElementById('qty-label').innerText = '전체 누적 판매수량';
                }

                const list = document.getElementById('inventory-list');
                list.innerHTML = '';
                for (const [key, info] of Object.entries(data.inventory)) {
                    const remain = info.total - info.sold;
                    const bClass = remain <= 5 ? 'badge low' : 'badge';
                    list.innerHTML += `
                        <li class="inv-item">
                            <span>${key.replace('_', ' / ')} (총 ${info.total})</span>
                            <span class="${bClass}">잔여 ${remain}</span>
                        </li>
                    `;
                }

                const dailyTb = document.getElementById('daily-body');
                dailyTb.innerHTML = '';
                const dailyKeys = Object.keys(data.dailyData).sort((a, b) => b.localeCompare(a));
                if (dailyKeys.length === 0) {
                    dailyTb.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--text-muted);">데이터가 없습니다.</td></tr>';
                } else {
                    dailyKeys.forEach(date => {
                        const d = data.dailyData[date];
                        const netRevenue = d.revenue - d.cancelRevenue;
                        dailyTb.innerHTML += `
                            <tr>
                                <td style="font-weight:700;">${date}</td>
                                <td>${formatMem(d.qty)} 개</td>
                                <td>${formatMem(d.revenue)} 원</td>
                                <td><span style="color:var(--danger);">${formatMem(d.cancelQty)} 개</span></td>
                                <td><span style="color:var(--danger);">${formatMem(d.cancelRevenue)} 원</span></td>
                                <td style="color:var(--primary); font-weight:700;">${formatMem(netRevenue)} 원</td>
                            </tr>
                        `;
                    });
                }

                const tb = document.getElementById('history-body');
                tb.innerHTML = '';
                data.sales.slice(0, 15).forEach(s => {
                    const isC = s.status === 'CANCEL';
                    const time = new Date(s.timestamp).toLocaleTimeString('ko-KR');

                    const addrHtml = s.customerAddress ? `<div style="font-size:0.8rem; color:#718096; margin-top:4px;">🏠 주소: ${s.customerAddress}</div>` : '';
                    const memoHtml = s.memo ? `<div style="font-size:0.8rem; color:#718096; margin-top:2px;">📝 메모: ${s.memo}</div>` : '';

                    tb.innerHTML += `
                        <tr>
                            <td class="${isC ? 'status-cancel' : 'status-sale'}">${isC ? '취소됨' : '판매완료'}</td>
                            <td>${time}</td>
                            <td>
                                <b style="color:#1A202C;">${s.product}</b> (${s.color}) - <span style="font-weight:700;">${s.qty}개</span><br>
                                <span style="font-size:0.85rem; color:#4A5568; font-weight:500; display:inline-block; margin-top:4px;">👤 ${s.customerName || '이름없음'} / 📞 ${s.customerPhone || '연락처없음'}</span>
                                ${addrHtml}
                                ${memoHtml}
                            </td>
                            <td style="font-weight:700;">${formatMem(s.totalAmount)}원</td>
                            <td>${!isC ? `<button class="cancel-btn" onclick="cancelOrder('${s._id}')">취소</button>` : ''}</td>
                        </tr>
                    `;
                });
            }
        }

        async function cancelOrder(id) {
            if (!confirm('해당 결제건을 취소 처리할까요? 재고가 원복됩니다.')) return;
            const res = await fetch('/api/popup/cancel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            const result = await res.json();
            if (result.success) fetchDashboard();
            else alert(result.message);
        }

        fetchDashboard();
        setInterval(fetchDashboard, 30000);
    </script>
</body>

</html>
